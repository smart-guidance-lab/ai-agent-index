name: Fetch AI Agent Repositories

on:
  schedule:
    # Run daily at 00:00 UTC (09:00 JST)
    - cron: '0 0 * * *'
  workflow_dispatch:
    # Allow manual trigger

jobs:
  fetch-and-summarize:
    runs-on: windows-latest
    permissions:
      contents: write  # For committing changes
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch and summarize AI Agent repos
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python fetch_ai_agents.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/agents.md
          $status = git status --porcelain data/
          if ($status) {
            git commit -m "chore: update AI Agent repositories summary [automated]"
            git push
          }
